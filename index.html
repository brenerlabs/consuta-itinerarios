<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumar Fretado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --muted: #8b8fa8;
    --hint: #555870;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --blue-glow: rgba(79,142,247,0.25);
    --green: #3ecf7a;
    --green-dim: rgba(62,207,122,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

  header {
    padding: 24px 20px;
    background: linear-gradient(to bottom, #1a1d27, #0f1117);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  h1 span { color: var(--green); font-size: 12px; font-weight: 700; background: var(--green-dim); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .search-box {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    padding: 14px 18px; border-radius: 14px; color: white; font-size: 15px; outline: none;
    transition: 0.2s; margin-bottom: 16px;
  }
  .search-box:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-dim); }

  .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 18px; background: var(--surface2); border-radius: 20px;
    font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer;
    color: var(--muted); border: 1px solid transparent; transition: 0.2s;
  }
  .tab.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

  .list-container { padding: 20px; display: grid; gap: 12px; }
  
  .line-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px; cursor: pointer; transition: 0.2s;
    position: relative; overflow: hidden;
  }
  .line-card:active { transform: scale(0.97); }
  .line-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .line-title { font-weight: 600; font-size: 16px; color: var(--text); }
  .line-badge { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--surface2); padding: 3px 8px; border-radius: 6px; color: var(--blue); font-weight: 600; }
  .line-desc { font-size: 13px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Detalhes */
  #detail-view {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); z-index: 200; display: none; flex-direction: column;
  }
  #detail-view.active { display: flex; }
  .nav-bar { padding: 18px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
  .back-btn { background: var(--surface2); border: none; color: white; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .type-nav { display: flex; padding: 16px 20px; gap: 10px; }
  .t-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-weight: 600; font-size: 13px; }
  .t-btn.active { background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 4px 12px var(--blue-glow); }

  .stops-scroll { flex: 1; overflow-y: auto; padding: 20px; }
  .stop-row { display: flex; gap: 18px; }
  .stop-left { display: flex; flex-direction: column; align-items: center; width: 26px; }
  .stop-circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; background: var(--bg); }
  .stop-circle.first { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px var(--blue-dim); }
  .stop-circle.last { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px var(--green-dim); }
  .stop-line { width: 2px; flex: 1; background: var(--border); margin: 4px 0; min-height: 35px; }
  .stop-content { padding-bottom: 28px; flex: 1; }
  .stop-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .label-destino { font-size: 10px; background: var(--green-dim); color: var(--green); padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 8px; vertical-align: middle; }
  
  .loading { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div id="main-view">
  <header>
    <h1>Alumar <span>Itinerários</span></h1>
    <input type="text" class="search-box" id="searchInput" placeholder="Busque por linha ou bairro..." oninput="doSearch(this.value)">
    <div class="tabs">
      <div class="tab active" onclick="doTab('TODOS')">Todos</div>
      <div class="tab" onclick="doTab('ADM')">ADM</div>
      <div class="tab" onclick="doTab('TURNO A')">Turno A</div>
      <div class="tab" onclick="doTab('TURNO B')">Turno B</div>
      <div class="tab" onclick="doTab('TURNO C')">Turno C</div>
    </div>
  </header>
  <div id="linesList" class="list-container">
    <div class="loading">Carregando rotas atualizadas...</div>
  </div>
</div>

<div id="detail-view">
  <div class="nav-bar">
    <button class="back-btn" onclick="closeLine()">✕</button>
    <div>
      <div id="det-title" style="font-weight: 600; font-size: 16px;">Linha</div>
      <div id="det-badge" style="font-size: 11px; color: var(--blue); font-weight: 600; text-transform: uppercase;">Turno</div>
    </div>
  </div>
  <div class="type-nav">
    <button id="b-ida" class="t-btn active" onclick="setTipo('IDA')">SENTIDO ALUMAR</button>
    <button id="b-volta" class="t-btn" onclick="setTipo('VOLTA')">SENTIDO BAIRRO</button>
  </div>
  <div class="stops-scroll" id="stopsList"></div>
</div>

<script>
let RAW = [];
let GROUPS = [];
let filterT = 'TODOS';
let filterS = '';
let currentLine = null;
let currentTipo = 'IDA';

// BUSCA O CSV
async function loadData() {
  try {
    // Adicionamos um timestamp para evitar cache do navegador
    const resp = await fetch('pontos.csv?v=' + new Date().getTime());
    if (!resp.ok) throw new Error();
    const txt = await resp.text();
    parseCSV(txt);
  } catch (e) {
    document.getElementById('linesList').innerHTML = `<div class="loading" style="color:#ff6b6b">Erro: O arquivo pontos.csv não foi encontrado.<br><small>Se estiver testando localmente, use o GitHub Pages.</small></div>`;
  }
}

function parseCSV(txt) {
  const lines = txt.split(/\r?\n/);
  RAW = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length >= 6) {
      RAW.push({
        turno: cols[0].trim(),
        linha: cols[1].trim(),
        tipo: cols[2].trim().toUpperCase(),
        bairro: cols[3].trim(),
        ponto: cols[4].trim(),
        parada: cols[5].trim()
      });
    }
  }
  groupData();
  render();
}

function groupData() {
  const m = {};
  RAW.forEach(r => {
    const k = `${r.turno}|${r.linha}`;
    if (!m[k]) m[k] = { turno: r.turno, linha: r.linha, stops: {}, bairros: new Set() };
    if (!m[k].stops[r.tipo]) m[k].stops[r.tipo] = [];
    m[k].stops[r.tipo].push(r);
    m[k].bairros.add(r.bairro);
  });
  GROUPS = Object.values(m);
}

function render() {
  const container = document.getElementById('linesList');
  const filtered = GROUPS.filter(g => {
    const tMatch = filterT === 'TODOS' || g.turno === filterT;
    const sMatch = g.linha.toLowerCase().includes(filterS.toLowerCase()) || 
                   Array.from(g.bairros).join(' ').toLowerCase().includes(filterS.toLowerCase());
    return tMatch && sMatch;
  });

  container.innerHTML = filtered.map(g => `
    <div class="line-card" onclick="openLine('${g.turno}|${g.linha}')">
      <div class="line-card-header">
        <div class="line-title">${g.linha}</div>
        <div class="line-badge">${g.turno}</div>
      </div>
      <div class="line-desc">${Array.from(g.bairros).join(' • ')}</div>
    </div>
  `).join('');
}

function openLine(id) {
  currentLine = GROUPS.find(g => `${g.turno}|${g.linha}` === id);
  currentTipo = 'IDA';
  document.getElementById('det-title').innerText = currentLine.linha;
  document.getElementById('det-badge').innerText = currentLine.turno;
  document.getElementById('detail-view').classList.add('active');
  renderStops();
}

function renderStops() {
  const list = currentLine.stops[currentTipo] || [];
  const container = document.getElementById('stopsList');
  
  container.innerHTML = list.map((s, i) => {
    const isFirst = i === 0;
    const isLast = i === list.length - 1;
    let tag = isLast ? (currentTipo === 'IDA' ? '<span class="label-destino">FÁBRICA</span>' : '<span class="label-destino">RESIDÊNCIA</span>') : '';

    return `
      <div class="stop-row">
        <div class="stop-left">
          <div class="stop-circle ${isFirst?'first':isLast?'last':''}">${isFirst?'●':isLast?'◉':String(i+1).padStart(2,'0')}</div>
          ${!isLast ? '<div class="stop-line"></div>' : ''}
        </div>
        <div class="stop-content">
          <div class="stop-name">${toCase(s.parada)} ${tag}</div>
          <div style="font-size:13px; color:var(--muted)">${toCase(s.ponto)}</div>
          <div style="font-size:11px; color:var(--hint); text-transform:uppercase; margin-top:2px;">${toCase(s.bairro)}</div>
        </div>
      </div>`;
  }).join('');
}

function setTipo(t) {
  currentTipo = t;
  document.getElementById('b-ida').classList.toggle('active', t === 'IDA');
  document.getElementById('b-volta').classList.toggle('active', t === 'VOLTA');
  renderStops();
}
function doSearch(v) { filterS = v; render(); }
function doTab(t) {
  filterT = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.innerText.toUpperCase() === t));
  render();
}
function closeLine() { document.getElementById('detail-view').classList.remove('active'); }
function toCase(s) { return s.toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase()); }

window.onload = loadData;
</script>
</body>
</html>
