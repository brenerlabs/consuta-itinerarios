<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumar Fretado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --muted: #8b8fa8;
    --hint: #555870;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --blue-glow: rgba(79,142,247,0.25);
    --green: #3ecf7a;
    --green-dim: rgba(62,207,122,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --pink: #f76fa0;
    --pink-dim: rgba(247,111,160,0.12);
    --coral: #ff6b4a;
    --coral-dim: rgba(255,107,74,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; }

  /* HEADER */
  .header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    backdrop-filter: blur(12px);
  }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .logo { width: 36px; height: 36px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; }
  .logo-text h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-text p { font-size: 12px; color: var(--muted); }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 11px 16px 11px 42px;
    color: var(--text); font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .search-wrap input::placeholder { color: var(--hint); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--hint); pointer-events: none; }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--border2); border: none; color: var(--muted); cursor: pointer; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: none; align-items: center; justify-content: center; }
  .search-clear.visible { display: flex; }

  /* TABS */
  .tabs { display: flex; gap: 6px; padding: 16px 20px 0; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border2); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .tab:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }
  .tab.active { background: var(--blue); border-color: var(--blue); color: white; }
  .tab.tab-adm.active { background: var(--blue); border-color: var(--blue); }
  .tab.tab-a.active { background: var(--green); border-color: var(--green); color: #0f1117; }
  .tab.tab-b.active { background: var(--amber); border-color: var(--amber); color: #0f1117; }
  .tab.tab-c.active { background: var(--pink); border-color: var(--pink); color: white; }

  /* MAIN CONTENT */
  .content { flex: 1; padding: 16px 20px; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; }
  .count-badge { font-size: 11px; color: var(--hint); font-family: 'DM Mono', monospace; }

  /* LINE CARDS */
  .line-list { display: flex; flex-direction: column; gap: 8px; }
  .line-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px;
  }
  .line-card:hover { background: var(--surface2); border-color: var(--border2); transform: translateY(-1px); }
  .line-icon {
    width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; font-family: 'DM Mono', monospace;
  }
  .line-icon.adm { background: var(--blue-dim); color: var(--blue); }
  .line-icon.turno-a { background: var(--green-dim); color: var(--green); }
  .line-icon.turno-b { background: var(--amber-dim); color: var(--amber); }
  .line-icon.turno-c { background: var(--pink-dim); color: var(--pink); }
  .line-info { flex: 1; min-width: 0; }
  .line-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .line-meta { font-size: 12px; color: var(--muted); }
  .line-arrow { color: var(--hint); font-size: 18px; flex-shrink: 0; }

  /* SEARCH RESULTS */
  .search-result-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; cursor: pointer; transition: all 0.15s; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .search-result-item:hover { background: var(--surface2); border-color: var(--border2); }
  .result-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 5px; }
  .result-info { flex: 1; }
  .result-stop { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .result-line { font-size: 12px; color: var(--muted); }
  .result-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }
  .result-badge.adm { background: var(--blue-dim); color: var(--blue); }
  .result-badge.turno-a { background: var(--green-dim); color: var(--green); }
  .result-badge.turno-b { background: var(--amber-dim); color: var(--amber); }
  .result-badge.turno-c { background: var(--pink-dim); color: var(--pink); }

  /* DETAIL VIEW */
  .detail-view { display: none; }
  .detail-view.active { display: block; }
  .main-view { display: block; }
  .main-view.hidden { display: none; }

  .back-btn {
    display: flex; align-items: center; gap: 6px; background: none; border: none;
    color: var(--blue); font-family: inherit; font-size: 14px; cursor: pointer;
    padding: 0; margin-bottom: 16px; font-weight: 500;
  }
  .back-btn:hover { color: #7aabf9; }

  .detail-header { margin-bottom: 20px; }
  .detail-turno-badge {
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
    border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 10px;
  }
  .detail-turno-badge.adm { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(79,142,247,0.2); }
  .detail-turno-badge.turno-a { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,122,0.2); }
  .detail-turno-badge.turno-b { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
  .detail-turno-badge.turno-c { background: var(--pink-dim); color: var(--pink); border: 1px solid rgba(247,111,160,0.2); }

  .detail-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
  .detail-subtitle { font-size: 13px; color: var(--muted); }

  /* TRIP TYPE TOGGLE */
  .trip-toggle { display: flex; gap: 6px; margin-bottom: 20px; }
  .trip-btn {
    flex: 1; padding: 9px 0; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
    border: 1px solid var(--border2); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .trip-btn.active { background: var(--surface2); border-color: var(--blue); color: var(--text); }

  /* STOPS TIMELINE */
  .stops-timeline { position: relative; }
  .stop-row { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 0; }
  .stop-left { display: flex; flex-direction: column; align-items: center; width: 28px; flex-shrink: 0; }
  .stop-circle {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
    flex-shrink: 0; border: 1.5px solid var(--border2); background: var(--surface); color: var(--muted);
    z-index: 1; position: relative;
  }
  .stop-circle.first { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
  .stop-circle.last { background: var(--coral-dim); border-color: var(--coral); color: var(--coral); }
  .stop-circle.factory { background: var(--blue); border-color: var(--blue); color: white; font-size: 14px; }
  .stop-connector { width: 2px; background: var(--border2); flex: 1; min-height: 18px; }
  .stop-body { flex: 1; padding-bottom: 16px; padding-top: 4px; }
  .stop-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .stop-detail { font-size: 12px; color: var(--muted); }
  .stop-bairro { font-size: 11px; color: var(--hint); margin-top: 2px; font-family: 'DM Mono', monospace; letter-spacing: 0.3px; }

  /* FACTORY ROW */
  .factory-row { background: var(--blue-dim); border: 1px solid rgba(79,142,247,0.2); border-radius: var(--radius); padding: 14px 16px; margin-top: 4px; display: flex; align-items: center; gap: 12px; }
  .factory-icon { font-size: 22px; }
  .factory-text h3 { font-size: 14px; font-weight: 600; color: var(--blue); }
  .factory-text p { font-size: 12px; color: var(--muted); }

  /* EMPTY / NO RESULTS */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* HIGHLIGHT */
  mark { background: rgba(79,142,247,0.25); color: var(--blue); border-radius: 2px; padding: 0 1px; }

  /* SCROLL */
  .content { overflow-y: auto; }

  /* MOBILE SAFE */
  @media (max-width: 480px) {
    .app { max-width: 100%; }
  }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .line-card, .search-result-item { animation: fadeIn 0.2s ease both; }
</style>
</head>

      <div class="stops-timeline" id="stops-list"></div>

</div>

let activeTab = 'TODOS';
let searchQuery = '';
let currentLine = null;
let currentTipo = 'IDA';

// ============================================================
// HELPERS
// ============================================================
function turnoClass(t) {
  if (t === 'ADM') return 'adm';
  if (t === 'TURNO A') return 'turno-a';
  if (t === 'TURNO B') return 'turno-b';
  if (t === 'TURNO C') return 'turno-c';
  return 'adm';
}

function turnoLabel(t) {
  if (t === 'ADM') return 'ADM';
  return t;
}

function lineIconText(linha) {
  const m = linha.match(/\d+/);
  return m ? m[0].padStart(2,'0') : linha.slice(0,2);
}

function normalize(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function highlight(text, query) {
  if (!query) return text;
  const n = normalize(query);
  const re = new RegExp('(' + n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ============================================================
// BUILD LINES INDEX
// ============================================================
function buildLines() {
  const map = {};
  RAW_DATA.forEach(r => {
    const key = r.turno + '||' + r.linha;
    if (!map[key]) {
      map[key] = { turno: r.turno, linha: r.linha, stops: {}, bairros: new Set() };
    }
    if (!map[key].stops[r.tipo]) map[key].stops[r.tipo] = [];
    map[key].stops[r.tipo].push(r);
    map[key].bairros.add(r.bairro);
  });
  return Object.values(map);
}

const LINES = buildLines();

// ============================================================
// RENDER LINES LIST
// ============================================================
function renderLines() {
  const list = document.getElementById('lines-list');
  const countEl = document.getElementById('lines-count');
  const titleEl = document.getElementById('lines-section-title');

  let filtered = LINES;
  if (activeTab !== 'TODOS') filtered = filtered.filter(l => l.turno === activeTab);

  titleEl.textContent = activeTab === 'TODOS' ? 'Linhas & Rotas' : (activeTab === 'ADM' ? 'Linhas ADM' : activeTab + ' — Rotas');
  countEl.textContent = filtered.length + ' ' + (filtered.length === 1 ? 'linha' : 'linhas');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🚌</div><p>Nenhuma linha neste turno</p></div>';
    return;
  }

  list.innerHTML = filtered.map((l, i) => {
    const tiposDisp = Object.keys(l.stops);
    const totalParadas = Math.max(...tiposDisp.map(t => l.stops[t].length));
    const bairrosArr = Array.from(l.bairros).slice(0,2).join(', ');
    const cls = turnoClass(l.turno);
    return `<div class="line-card" style="animation-delay:${i*30}ms" onclick="openLine('${l.turno}','${l.linha}')">
      <div class="line-icon ${cls}">${lineIconText(l.linha)}</div>
      <div class="line-info">
        <div class="line-name">${l.linha}</div>
        <div class="line-meta">${totalParadas} paradas · ${bairrosArr}${Array.from(l.bairros).length > 2 ? '…' : ''}</div>
      </div>
      <div class="line-arrow">›</div>
    </div>`;
  }).join('');
}

// ============================================================
// SEARCH
// ============================================================
function handleSearch(val) {
  searchQuery = val.trim();
  document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
  const sr = document.getElementById('search-results-section');
  const ls = document.getElementById('lines-section');

  if (searchQuery.length < 2) {
    sr.style.display = 'none';
    ls.style.display = 'block';
    renderLines();
    return;
  }

  sr.style.display = 'block';
  ls.style.display = 'none';

  const q = normalize(searchQuery);
  const matches = RAW_DATA.filter(r =>
    normalize(r.parada).includes(q) ||
    normalize(r.bairro).includes(q) ||
    normalize(r.ponto).includes(q) ||
    normalize(r.linha).includes(q)
  );

  document.getElementById('results-count').textContent = matches.length + ' resultado' + (matches.length !== 1 ? 's' : '');

  if (matches.length === 0) {
    document.getElementById('search-results-list').innerHTML =
      '<div class="empty"><div class="empty-icon">🔍</div><p>Nenhuma parada encontrada para "<strong>' + searchQuery + '"</strong></p></div>';
    return;
  }

  // Deduplicate by parada+linha+tipo
  const seen = new Set();
  const unique = matches.filter(r => {
    const k = r.parada + r.linha + r.tipo;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  document.getElementById('search-results-list').innerHTML = unique.slice(0, 30).map((r, i) => {
    const cls = turnoClass(r.turno);
    return `<div class="search-result-item" style="animation-delay:${i*20}ms" onclick="openLine('${r.turno}','${r.linha}','${r.tipo}')">
      <div class="result-dot" style="background:var(--${cls === 'adm' ? 'blue' : cls === 'turno-a' ? 'green' : cls === 'turno-b' ? 'amber' : 'pink'})"></div>
      <div class="result-info">
        <div class="result-stop">${highlight(toTitleCase(r.parada), searchQuery)}</div>
        <div class="result-line">
          ${highlight(toTitleCase(r.bairro), searchQuery)} · ${r.linha} · ${r.tipo}
          <span class="result-badge ${cls}">${turnoLabel(r.turno)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  handleSearch('');
}

function toTitleCase(str) {
  const minusculas = new Set(['de','da','do','das','dos','e','a','o','as','os','em','na','no','nas','nos','por','para','com','sem']);
  return str.toLowerCase().split(' ').map((word, i) => {
    if (!word) return word;
    if (i > 0 && minusculas.has(word)) return word;
    return word.replace(/^./, c => c.toLocaleUpperCase('pt-BR'));
  }).join(' ');
}

// ============================================================
// OPEN LINE DETAIL
// ============================================================
function openLine(turno, linha, tipo) {
  currentLine = LINES.find(l => l.turno === turno && l.linha === linha);
  if (!currentLine) return;

  const tiposDisp = Object.keys(currentLine.stops);
  currentTipo = tipo && tiposDisp.includes(tipo) ? tipo : tiposDisp[0];

  document.getElementById('main-view').classList.add('hidden');
  document.getElementById('detail-view').classList.add('active');

  const cls = turnoClass(turno);
  document.getElementById('detail-badge').className = 'detail-turno-badge ' + cls;
  document.getElementById('detail-badge').textContent = turnoLabel(turno) + ' · ' + linha;
  document.getElementById('detail-title').textContent = linha;
  document.getElementById('detail-subtitle').textContent = Array.from(currentLine.bairros).join(' · ');

  // Trip type toggle
  const toggleEl = document.getElementById('trip-toggle');
  if (tiposDisp.length > 1) {
    toggleEl.innerHTML = tiposDisp.map(t =>
      `<button class="trip-btn ${t === currentTipo ? 'active' : ''}" onclick="switchTipo('${t}')">${t === 'IDA' ? '→ Ida (cidade → fábrica)' : '← Volta (fábrica → cidade)'}</button>`
    ).join('');
    toggleEl.style.display = 'flex';
  } else {
    toggleEl.style.display = 'none';
  }

  renderStops();
}

function switchTipo(tipo) {
  currentTipo = tipo;
  document.querySelectorAll('.trip-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.startsWith(tipo === 'IDA' ? '→' : '←'));
  });
  renderStops();
}

function renderStops() {
  const stops = currentLine.stops[currentTipo] || [];
  const el = document.getElementById('stops-list');

  if (stops.length === 0) {
    el.innerHTML = '<div class="empty"><p>Sem paradas cadastradas para esta direção</p></div>';
    return;
  }

  el.innerHTML = stops.map((s, i) => {
    const isFirst = i === 0;
    const isLast = i === stops.length - 1;
    const circleClass = isFirst ? 'first' : isLast ? 'last' : '';
    const num = String(i + 1).padStart(2, '0');
    return `<div class="stop-row">
      <div class="stop-left">
        <div class="stop-circle ${circleClass}">${isFirst ? '●' : isLast ? '◉' : num}</div>
        ${!isLast ? '<div class="stop-connector"></div>' : ''}
      </div>
      <div class="stop-body">
        <div class="stop-name">${toTitleCase(s.parada)}</div>
        <div class="stop-detail">${toTitleCase(s.ponto)}</div>
        <div class="stop-bairro">${toTitleCase(s.bairro)}</div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// NAV
// ============================================================
function goBack() {
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('main-view').classList.remove('hidden');
  currentLine = null;
}

function filterTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabMap = { 'TODOS': 'tab-all', 'ADM': 'tab-adm', 'TURNO A': 'tab-a', 'TURNO B': 'tab-b', 'TURNO C': 'tab-c' };
  const el = document.querySelector('.' + tabMap[tab]);
  if (el) el.classList.add('active');
  renderLines();
}

// ============================================================
// INIT
// ============================================================
renderLines();
</script>
</body>
</html>
